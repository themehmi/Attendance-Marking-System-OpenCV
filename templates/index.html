<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scanner | Face Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800 relative">
    
    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden transition-opacity"></div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="w-64 bg-slate-900 text-white flex flex-col shadow-xl absolute md:relative z-50 h-full transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="h-16 flex items-center justify-between md:justify-center px-4 md:px-0 border-b border-slate-700">
            <h1 class="text-xl font-bold tracking-wider"><i class="fa-solid fa-expand text-blue-400 mr-2"></i> VisionAI</h1>
            <!-- Close button for mobile -->
            <button id="close-sidebar" class="md:hidden text-gray-400 hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="/" class="flex items-center px-4 py-3 bg-blue-600 text-white rounded-lg shadow-md transition-colors">
                <i class="fa-solid fa-camera mr-3"></i> Live Scanner
            </a>
            <a href="/logs" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
                <i class="fa-solid fa-table-list mr-3"></i> Attendance Logs
            </a>
        </nav>
        <div class="p-4 text-xs text-slate-500 text-center border-t border-slate-800">
            System v2.0 (Cloud)
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto w-full">
        <!-- Top Header -->
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-4 md:px-8 z-10 shrink-0">
            <div class="flex items-center">
                <!-- Hamburger Menu Button -->
                <button id="open-sidebar" class="md:hidden mr-3 text-gray-600 hover:text-blue-600 transition-colors">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <h2 class="text-lg md:text-xl font-semibold text-gray-700 truncate">Entrance Checkpoint</h2>
            </div>
            
            <div class="flex items-center text-xs md:text-sm text-green-600 bg-green-50 px-2 md:px-3 py-1.5 rounded-full border border-green-200 whitespace-nowrap ml-2">
                <span class="w-2 h-2 bg-green-500 rounded-full mr-1.5 md:mr-2 animate-pulse"></span> 
                <span class="hidden sm:inline">Cloud System Active</span>
                <span class="sm:hidden">Active</span>
            </div>
        </header>
        
        <!-- Camera Panel -->
        <div class="p-4 md:p-8 flex-1 flex justify-center items-start">
            <div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden w-full max-w-4xl flex flex-col">
                
                <div class="bg-slate-50 px-4 md:px-6 py-4 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 sm:gap-0">
                    <div>
                        <h3 class="font-medium text-gray-700 flex items-center"><i class="fa-solid fa-video text-red-500 mr-2"></i> Live Camera Feed</h3>
                        <span class="text-xs text-gray-400">Position face in center of frame</span>
                    </div>
                    <button id="toggle-camera" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg shadow transition-colors text-sm font-medium flex items-center justify-center">
                        <i class="fa-solid fa-power-off mr-2"></i> Turn On Camera
                    </button>
                </div>
                
                <div class="p-4 md:p-6 bg-gray-100 flex justify-center items-center flex-1">
                    <div class="relative rounded-xl overflow-hidden shadow-inner border-4 border-slate-800 bg-black min-h-[300px] md:min-h-[400px] w-full flex justify-center items-center">
                        
                        <!-- Offline Placeholder -->
                        <div id="camera-placeholder" class="text-white flex flex-col items-center z-20 p-4 text-center">
                            <i class="fa-solid fa-video-slash text-4xl md:text-5xl mb-3 text-gray-600"></i>
                            <span class="text-gray-400 font-medium text-sm md:text-base">Camera is offline</span>
                        </div>

                        <!-- Hidden Video Element for capturing local webcam -->
                        <video id="local-video" autoplay playsinline class="hidden"></video>
                        
                        <!-- Image Element for displaying the processed frame -->
                        <img id="processed-feed" src="" class="w-full h-auto max-h-[400px] md:max-h-[600px] object-contain hidden z-10" alt="Processed Feed">
                        
                        <!-- Decorative Viewfinder Corners -->
                        <div class="absolute top-2 left-2 md:top-4 md:left-4 w-6 h-6 md:w-8 md:h-8 border-t-4 border-l-4 border-blue-500 opacity-70 z-20 pointer-events-none"></div>
                        <div class="absolute top-2 right-2 md:top-4 md:right-4 w-6 h-6 md:w-8 md:h-8 border-t-4 border-r-4 border-blue-500 opacity-70 z-20 pointer-events-none"></div>
                        <div class="absolute bottom-2 left-2 md:bottom-4 md:left-4 w-6 h-6 md:w-8 md:h-8 border-b-4 border-l-4 border-blue-500 opacity-70 z-20 pointer-events-none"></div>
                        <div class="absolute bottom-2 right-2 md:bottom-4 md:right-4 w-6 h-6 md:w-8 md:h-8 border-b-4 border-r-4 border-blue-500 opacity-70 z-20 pointer-events-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- UI & Camera Logic -->
    <script>
        // --- Mobile Sidebar Logic ---
        const sidebar = document.getElementById('sidebar');
        const openSidebarBtn = document.getElementById('open-sidebar');
        const closeSidebarBtn = document.getElementById('close-sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            sidebarOverlay.classList.toggle('hidden');
        }

        openSidebarBtn.addEventListener('click', toggleSidebar);
        closeSidebarBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // --- Camera Processing Logic ---
        const toggleBtn = document.getElementById('toggle-camera');
        const localVideo = document.getElementById('local-video');
        const processedFeed = document.getElementById('processed-feed');
        const placeholder = document.getElementById('camera-placeholder');
        
        let isCameraOn = false;
        let localStream = null;
        let processingInterval = null;

        // Hidden canvas to grab frames from the video
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');

        async function startCamera() {
            try {
                // Ask the user's browser for webcam access
                // Added exact constraint for better mobile support
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' } 
                });
                localVideo.srcObject = localStream;
                placeholder.classList.add('hidden');
                processedFeed.classList.remove('hidden');
                
                // Wait for video to be ready before getting dimensions
                localVideo.onloadedmetadata = () => {
                    canvas.width = localVideo.videoWidth;
                    canvas.height = localVideo.videoHeight;
                    
                    // Send a frame to Python every 300 milliseconds (roughly 3fps)
                    processingInterval = setInterval(sendFrameToServer, 300);
                };
            } catch (err) {
                alert("Camera access denied or no camera found.");
                console.error(err);
                toggleCamera(); // Reset UI if it fails
            }
        }

        function stopCamera() {
            if (localStream) {
                // Turn off the actual webcam hardware light
                localStream.getTracks().forEach(track => track.stop());
            }
            if (processingInterval) {
                // Stop sending data to Python
                clearInterval(processingInterval);
            }
            processedFeed.src = "";
            processedFeed.classList.add('hidden');
            placeholder.classList.remove('hidden');
        }

        async function sendFrameToServer() {
            if (!isCameraOn) return;

            // Draw current video frame to our hidden canvas
            context.drawImage(localVideo, 0, 0, canvas.width, canvas.height);
            
            // Convert that canvas frame into a base64 string
            const dataURL = canvas.toDataURL('image/jpeg', 0.7);

            try {
                // Send it to your app.py /process_frame route
                const response = await fetch('/process_frame', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ image: dataURL })
                });

                const data = await response.json();
                
                // Display the image returned by Python (with the green boxes drawn on it)
                if (data.image) {
                    processedFeed.src = data.image;
                } else if (data.error) {
                    console.error("Server Error:", data.error);
                }
            } catch (err) {
                console.error("Error communicating with backend", err);
            }
        }

        function toggleCamera() {
            isCameraOn = !isCameraOn;
            
            if (isCameraOn) {
                startCamera();
                toggleBtn.innerHTML = '<i class="fa-solid fa-stop mr-2"></i> Turn Off Camera';
                toggleBtn.classList.replace('bg-blue-600', 'bg-red-600');
                toggleBtn.classList.replace('hover:bg-blue-700', 'hover:bg-red-700');
            } else {
                stopCamera();
                toggleBtn.innerHTML = '<i class="fa-solid fa-power-off mr-2"></i> Turn On Camera';
                toggleBtn.classList.replace('bg-red-600', 'bg-blue-600');
                toggleBtn.classList.replace('hover:bg-red-700', 'hover:bg-blue-700');
            }
        }

        toggleBtn.addEventListener('click', toggleCamera);
    </script>
</body>
</html>
